</head>
<body>

    <h2>Formulário de Cadastro</h2>

    <form>
        Nome: <br>
        <input type="text" name="nome"><br><br>

        Idade: <br>
        <input type="number" name="idade"><br><br>

        Curso: <br>
        <input type="text" name="curso"><br><br>

        <input type="submit" value="Cadastrar">
        <input type="reset" value="Limpar">

        </tr>

        </tr>

        </tr>
        <tr>
            <td>Carlos</td>

        </tr>
    </table>

</body>
</html>
